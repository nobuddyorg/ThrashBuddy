version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "apps/api"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "apps/ui"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"
    
    ignore:
      - dependency-name: "typescript"
        versions:
          - ">=5.9.0"

  - package-ecosystem: "npm"
    directory: "tests/ui"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "helm"
    directory: "configs/helm"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "apps/api"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "apps/ui"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "apps/k6"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns:
          - "*"
